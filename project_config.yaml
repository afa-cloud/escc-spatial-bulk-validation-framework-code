project:
  name: escc_spatial_bulk_validation_framework
  disease: esophageal squamous cell carcinoma
  article_type: public_data_bioinformatics
  framework: spatial_hypothesis_to_bulk_validation_to_source_table_reproducibility
  data_strategy: public_preprocessed_and_published_quantitative_tables
  raw_spatial_matrix_reanalysis: false
  controlled_access_data_used: false
  wet_lab_validation: false

scope:
  primary_demonstration:
    - caf_ecm_stromal_remodeling_phenotype
    - ogt_pi3k_hypoxia_context
  transferability_demonstration:
    - differentiation_keratinization_phenotype
    - cancerization_progression_phenotype
  inference_boundary:
    - association_level_evidence
    - source_table_reproducibility
    - no_causal_inference
    - no_survival_prediction_claim
    - no_drug_sensitivity_prediction_claim

data_sources:
  bulk_expression_and_clinical:
    - TCGA/GDC TCGA-ESCA case metadata
    - UCSC Xena / Toil TCGA-GTEx expression matrices
    - GEO GSE47404
    - GEO GSE53625 public series matrix and probe-sequence rescue
  spatial_source_tables:
    - HRA003627 published source data from Liu et al. 2023
    - HRA008846 published supplementary tables from Liu et al. 2026
  supplementary_target_context:
    - GDSC2 fitted dose-response tables and CancerRxGene cell-line annotation

analysis_stages:
  - id: axis_definition
    output: S1_Table.xlsx sheet S1_axis_definitions
    quality_check: predefined gene sets, no optimized weights
  - id: bulk_association
    output: S1_Table.xlsx sheets S2 to S5
    quality_check: ESCC squamous subset and independent GSE47404 replication
  - id: gse53625_supportive_rescue
    output: S1_Table.xlsx sheets S6 to S7 and S20
    quality_check: target-scope probe rescue and array-design duplicate check
  - id: source_table_reproducibility
    output: S1_Table.xlsx sheets S8 to S11
    quality_check: published source/supplementary table quantification only
  - id: sensitivity_analysis
    output: S1_Table.xlsx sheets S17 to S19
    quality_check: gene-set overlap, overlap-removed correlation and z-score sensitivity
  - id: supplementary_transferability
    output: S3_Transferability_Supplement.xlsx
    quality_check: association and source-table level transferability only

statistics:
  axis_score:
    expression_scale: log2_like_expression_or_platform_original_scale_as_documented
    aggregation: mean_of_available_genes
    imputation: none
    optimized_weights: none
  sensitivity:
    overlap_removed_correlation: spearman_after_removing_axis_genes_from_comparator_panel
    zscore_sensitivity: within_cohort_gene_zscore_before_score_aggregation
  multiple_testing:
    method: Benjamini-Hochberg false discovery rate
  clinical_grouping:
    median_split: fixed_nonparametric_descriptive_rule
    optimized_cutpoint: false

reproducibility:
  primary_code_package: S2_Code.zip
  primary_processed_table: S1_Table.xlsx
  transferability_table: S3_Transferability_Supplement.xlsx
  public_repository: https://github.com/afa-cloud/escc-spatial-bulk-validation-framework-code
version_tag: v1.0.7-submission-cleanmanifest
version_doi: assigned_by_zenodo_after_release
  concept_doi: 10.5281/zenodo.19826728
